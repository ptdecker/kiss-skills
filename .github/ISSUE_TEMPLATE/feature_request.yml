name: Feature Request
description: Suggest a new skill or an improvement to an existing one
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      description: Is this a new skill or a change to an existing one?
      options:
        - New skill idea
        - Improvement to review-copilot
        - Improvement to pr-announce
        - Improvement to install/uninstall
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature or improvement. What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or alternative approaches?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that would help us understand the request.
    validations:
      required: false
