name: Bug Report
description: Report a problem with a KISS skill
labels: ["bug"]
body:
  - type: dropdown
    id: skill
    attributes:
      label: Skill
      description: Which skill is affected?
      options:
        - review-copilot
        - pr-announce
        - install.sh / uninstall.sh
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect, and what actually happened?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `/review-copilot 42`
        2. ...
    validations:
      required: true
  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: Paste any relevant error messages or Claude Code output.
      render: text
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Claude Code version, gh CLI version, etc.
      placeholder: |
        - OS: macOS 15.3
        - Claude Code: 1.x.x
        - gh: 2.x.x
    validations:
      required: false
